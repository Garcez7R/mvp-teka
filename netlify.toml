[build]
  command = "pnpm build"
  publish = "dist/public"
  functions = "netlify/functions"

[[redirects]]
  from = "/trpc"
  to = "/.netlify/functions/trpc"
  status = 200
  force = true

[[redirects]]
  from = "/trpc/*"
  to = "/.netlify/functions/trpc/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
