  </text>
  <line x1="140" y1="330" x2="460" y2="330" stroke="#f2d7a2" stroke-width="2"/>
  <line x1="140" y1="580" x2="460" y2="580" stroke="#f2d7a2" stroke-width="2"/>
</svg>
